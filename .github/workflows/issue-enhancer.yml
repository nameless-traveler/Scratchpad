name: IssueCraft

on:
  issues:
    types: [opened]

jobs:
  enhance-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: nameless-traveler/issuecraft@v1
        with:
          ai-provider: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
